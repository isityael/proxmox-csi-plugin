# proxmox-csi-plugin - CI: Go verification and compile checks
when:
  - event: pull_request
  - event: push
    branch:
      - main
      - sm-moshi/main
  - event: manual

steps:
  - name: test
    image: dhi.io/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
    commands:
      - go mod download
      - go mod verify
      - go test -timeout=5m -tags=unit $(go list ./...)

  - name: build
    image: dhi.io/golang:1.26.3-debian13-dev@sha256:5d1f9634fc21d351b8712212864d435bfe4204eca3d60b61cc7cfd491d776357
    commands:
      - mkdir -p bin
      - |
        SHA="$(git describe --match=none --always --abbrev=7 --dirty)"
        TAG="$(git describe --tag --always --match 'v[0-9]*')"

        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags "-w -s -X main.version=$${TAG} -X main.commit=$${SHA}" \
          -o bin/proxmox-csi-controller-amd64 ./cmd/controller

        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags "-w -s -X main.version=$${TAG} -X main.commit=$${SHA}" \
          -o bin/proxmox-csi-node-amd64 ./cmd/node

        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags "-w -s -X main.version=$${TAG} -X main.commit=$${SHA}" \
          -o bin/pvecsictl-amd64 ./cmd/pvecsictl

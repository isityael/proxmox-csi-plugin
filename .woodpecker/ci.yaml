# proxmox-csi-plugin - CI: Go verification and compile checks
when:
  - event: pull_request
  - event: push
    branch:
      - main
      - sm-moshi/main
  - event: manual

steps:
  - name: chart-version-guard
    image: ghcr.io/isityael/chart-version-guard:main@sha256:f7cf9ca003a6cec07fa071f00a7f65757cbbeaa0048d1a97746f842864ff7ea1
    commands:
      - chart-version-guard check --ci woodpecker --repo .

  - name: test
    image: dhi.io/golang:1.26.5-debian13-dev@sha256:a19f8e2ecbd750863e1c84533ff37be18a0c41fab91c9260abb311e4335bdb46
    environment:
      GOMODCACHE: /tmp/go/pkg/mod
      GO_CACHE_ARCHIVE: /woodpecker/cache/proxmox-csi-plugin/go-modcache.tar
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    commands:
      - mkdir -p "$${GOMODCACHE}" "$$(dirname "$${GO_CACHE_ARCHIVE}")"
      - '[ ! -f "$${GO_CACHE_ARCHIVE}" ] || tar -xf "$${GO_CACHE_ARCHIVE}" -C /tmp/go'
      - go mod download
      - go mod verify
      - go test -timeout=5m -tags=unit $(go list ./...)
      - tar -cf "$${GO_CACHE_ARCHIVE}" -C /tmp/go pkg/mod

  - name: build
    image: dhi.io/golang:1.26.5-debian13-dev@sha256:a19f8e2ecbd750863e1c84533ff37be18a0c41fab91c9260abb311e4335bdb46
    environment:
      GOMODCACHE: /tmp/go/pkg/mod
      GO_CACHE_ARCHIVE: /woodpecker/cache/proxmox-csi-plugin/go-modcache.tar
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    commands:
      - mkdir -p "$${GOMODCACHE}"
      - '[ ! -f "$${GO_CACHE_ARCHIVE}" ] || tar -xf "$${GO_CACHE_ARCHIVE}" -C /tmp/go'
      - mkdir -p bin
      - |
        SHA="$(git describe --match=none --always --abbrev=7 --dirty)"
        TAG="$(git describe --tag --always --match 'v[0-9]*')"

        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags "-w -s -X main.version=$${TAG} -X main.commit=$${SHA}" \
          -o bin/proxmox-csi-controller-amd64 ./cmd/controller

        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags "-w -s -X main.version=$${TAG} -X main.commit=$${SHA}" \
          -o bin/proxmox-csi-node-amd64 ./cmd/node

        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags "-w -s -X main.version=$${TAG} -X main.commit=$${SHA}" \
          -o bin/pvecsictl-amd64 ./cmd/pvecsictl
